<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Guía Quema Grasa</title>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React y ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para traducir React en el propio navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ocultar barra de scroll para un aspecto más de App nativa */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-[#EAEAEA]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ICONOS SVG INCORPORADOS (Para que no falle sin internet/paquetes) ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Activity = (p) => <Icon {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;
    const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></Icon>;
    const Crosshair = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></Icon>;
    const Hexagon = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></Icon>;
    const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Minus = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/></Icon>;

    // --- SISTEMA DE DISEÑO ---
    const theme = {
      bg: "bg-[#EAEAEA]",
      textMain: "text-[#1A1A1A]",
      accent: "text-[#FF4A1C]",
      fontMono: "font-mono tracking-widest uppercase",
      panel3D: "bg-[#F3F3F3] border border-[#FFFFFF] shadow-[4px_10px_20px_rgba(0,0,0,0.1),_inset_0_1px_1px_rgba(255,255,255,0.8)]",
      btn3D: "bg-gradient-to-b from-[#FFFFFF] to-[#E5E5E5] border border-[#D0D0D0] shadow-[0_4px_6px_rgba(0,0,0,0.1),_inset_0_1px_0_rgba(255,255,255,1)] active:shadow-[0_1px_2px_rgba(0,0,0,0.1),_inset_0_2px_4px_rgba(0,0,0,0.1)] active:translate-y-[2px] transition-all",
      grooveInset: "bg-[#E0E0E0] shadow-[inset_0_4px_8px_rgba(0,0,0,0.15),_0_1px_0_rgba(255,255,255,0.8)]",
      blackKnob: "bg-gradient-to-b from-[#4A4A4A] to-[#1A1A1A] border border-[#000000] shadow-[0_15px_25px_rgba(0,0,0,0.4),_inset_0_2px_3px_rgba(255,255,255,0.3)]",
    };

    // --- SISTEMA DE AUDIO ---
    const sounds = {
      click: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
      switch: new Audio('https://www.soundjay.com/mechanical/sounds/switch-1.mp3'),
      success: new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3')
    };

    const playSound = (type) => {
      try {
        if (sounds[type]) {
          sounds[type].currentTime = 0;
          sounds[type].play().catch(() => {});
        }
      } catch(e) {}
    };

    // --- APLICACIÓN PRINCIPAL ---
    function App() {
      const [activeTab, setActiveTab] = useState('tracker'); 
      const [steps, setSteps] = useState(0);
      const [water, setWater] = useState(0);
      const [workout, setWorkout] = useState('descanso'); 
      const [routineType, setRoutineType] = useState('A'); 
      const [completedExercises, setCompletedExercises] = useState({});
      const [stepHistory, setStepHistory] = useState([]);

      useEffect(() => {
        try {
          const today = new Date().toLocaleDateString('es-ES');
          const savedDate = localStorage.getItem('lastDate');
          const savedHistory = JSON.parse(localStorage.getItem('stepHistory') || '[]');
          setStepHistory(savedHistory);

          if (savedDate && savedDate !== today) {
            const savedSteps = parseInt(localStorage.getItem('steps') || '0');
            const newHistoryEntry = { date: savedDate, steps: savedSteps };
            const updatedHistory = [...savedHistory, newHistoryEntry];
            if (updatedHistory.length > 30) updatedHistory.shift();
            
            setStepHistory(updatedHistory);
            localStorage.setItem('stepHistory', JSON.stringify(updatedHistory));

            setSteps(0); setWater(0); setWorkout('descanso'); setCompletedExercises({});
            localStorage.setItem('lastDate', today);
            
            const savedRoutine = localStorage.getItem('routineType');
            if (savedRoutine) setRoutineType(savedRoutine);
          } else {
            const savedSteps = localStorage.getItem('steps');
            const savedWater = localStorage.getItem('water');
            const savedWorkout = localStorage.getItem('workout');
            const savedRoutine = localStorage.getItem('routineType');
            const savedExercises = localStorage.getItem('completedExercises');
            
            if (savedSteps) setSteps(parseInt(savedSteps));
            if (savedWater) setWater(parseInt(savedWater));
            if (savedWorkout) setWorkout(savedWorkout);
            if (savedRoutine) setRoutineType(savedRoutine);
            if (savedExercises) setCompletedExercises(JSON.parse(savedExercises));
            if (!savedDate) localStorage.setItem('lastDate', today);
          }
        } catch(e) { console.warn("Modo privado bloquea LocalStorage"); }
      }, []);

      useEffect(() => {
        try {
          const today = new Date().toLocaleDateString('es-ES');
          localStorage.setItem('lastDate', today);
          localStorage.setItem('steps', steps.toString());
          localStorage.setItem('water', water.toString());
          localStorage.setItem('workout', workout);
          localStorage.setItem('routineType', routineType);
          localStorage.setItem('completedExercises', JSON.stringify(completedExercises));
        } catch(e) {}
      }, [steps, water, workout, routineType, completedExercises]);

      return (
        <div className={`flex flex-col min-h-screen ${theme.bg} ${theme.textMain} font-sans relative overflow-hidden`}>
          
          <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-30 z-0">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
              <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#000" /></pattern></defs>
              <rect width="100%" height="100%" fill="url(#grid)" />
              <line x1="20" y1="0" x2="20" y2="100%" stroke="#1A1A1A" strokeWidth="0.5" />
              <line x1="100%" y1="60" x2="0" y2="60" stroke="#1A1A1A" strokeWidth="0.5" strokeDasharray="4 4" />
            </svg>
          </div>

          <header className="pt-8 pb-3 px-6 relative z-10 w-full flex justify-between items-end border-b border-[#D0D0D0] max-w-2xl mx-auto bg-white/40 backdrop-blur-md shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
            <div>
              <h1 className={`${theme.fontMono} text-xs font-bold tracking-[0.3em]`}>SYS.QG // V.3.0</h1>
              <p className="text-[9px] text-[#606060] font-mono mt-1 tracking-widest font-semibold">ID: 52Y_80KG_179CM</p>
            </div>
            <div className="flex items-center gap-2 bg-[#1A1A1A] px-2 py-1 rounded shadow-inner">
              <span className="w-1.5 h-1.5 rounded-full bg-[#FF4A1C] shadow-[0_0_5px_#FF4A1C] animate-pulse"></span>
              <span className="text-[8px] font-mono text-white tracking-widest">EN LINEA</span>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-32 max-w-2xl mx-auto w-full relative z-10 scrollbar-hide">
            {activeTab === 'menu' && <MenuTab />}
            {activeTab === 'tracker' && (
              <TrackerTab 
                steps={steps} setSteps={setSteps} 
                water={water} setWater={setWater} 
                workout={workout} setWorkout={setWorkout}
                routineType={routineType} setRoutineType={setRoutineType}
                completedExercises={completedExercises} setCompletedExercises={setCompletedExercises}
              />
            )}
            {activeTab === 'tips' && <TipsTab />}
          </main>

          <nav className="fixed bottom-0 left-0 w-full h-20 bg-[#EAEAEA] border-t border-[#FFFFFF] shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50 flex justify-center pb-4">
            <div className="max-w-md w-full flex justify-around items-center px-4">
              <NavItem icon={<Database size={18} />} label="DATA_NUT." isActive={activeTab === 'menu'} onClick={() => { playSound('click'); setActiveTab('menu'); }} />
              <NavItem icon={<Crosshair size={18} />} label="HUD_MAIN" isActive={activeTab === 'tracker'} onClick={() => { playSound('click'); setActiveTab('tracker'); }} />
              <NavItem icon={<Terminal size={18} />} label="LOG_TIPS" isActive={activeTab === 'tips'} onClick={() => { playSound('click'); setActiveTab('tips'); }} />
            </div>
          </nav>
        </div>
      );
    }

    const workoutPlan = {
      fuerzaA: [
        { id: 'fa1', name: 'SENTADILLA (BARRA 20KG)', sets: '3 x 12-15 REPS' },
        { id: 'fa2', name: 'PRESS SUELO (MANC. 7.5KG)', sets: '3 x 12-15 REPS' },
        { id: 'fa3', name: 'REMO (BARRA 20KG)', sets: '3 x 12-15 REPS' },
        { id: 'fa4', name: 'PLANCHA TÁCTICA', sets: '3 x 40 SEG' }
      ],
      fuerzaB: [
        { id: 'fb1', name: 'PESO MUERTO (BARRA 20KG)', sets: '3 x 15 REPS' },
        { id: 'fb2', name: 'PRESS MILITAR (MANC. 7.5KG)', sets: '3 x 10-12 REPS' },
        { id: 'fb3', name: 'TIRÓN (SISTEMA GOMAS)', sets: '3 x 15 REPS' },
        { id: 'fb4', name: 'ZANCADAS (MANC. 7.5KG)', sets: '3 x 10/PIERNA' }
      ],
      cardio: [
        { id: 'c1', name: 'RUTA TRABAJO (5KM)', sets: 'MARCHA SOSTENIDA' },
        { id: 'c2', name: 'PASEO RECUPERACIÓN', sets: '30 MIN LISS' },
        { id: 'c3', name: 'CIRCUITO GOMAS', sets: '15 MIN ALTO REND.' }
      ],
      descanso: [
        { id: 'r1', name: 'CICLO DE SUEÑO', sets: '7-8 HORAS' },
        { id: 'r2', name: 'CALIBRACIÓN ARTICULAR', sets: '15 MIN MOVILIDAD' },
        { id: 'r3', name: 'PASEO DESCOMPRESIÓN', sets: 'SIN EXIGENCIA' }
      ]
    };

    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button onClick={onClick} className={`relative w-20 h-14 flex flex-col items-center justify-center rounded-xl transition-all duration-300 ${isActive ? 'bg-[#D0D0D0] shadow-[inset_0_4px_6px_rgba(0,0,0,0.1),_0_1px_0_rgba(255,255,255,0.8)] translate-y-[2px] text-[#FF4A1C]' : 'bg-[#F0F0F0] shadow-[0_4px_6px_rgba(0,0,0,0.1),_inset_0_1px_0_rgba(255,255,255,1)] text-[#606060] hover:text-[#1A1A1A] pb-1'}`}>
          <div className={`mb-1 transition-transform ${isActive ? 'scale-110 drop-shadow-[0_2px_4px_rgba(255,74,28,0.4)]' : ''}`}>{icon}</div>
          <span className={`${theme.fontMono} text-[8px] font-bold`}>{label}</span>
          {isActive && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-[#FF4A1C] rounded-full shadow-[0_0_4px_#FF4A1C]"></div>}
        </button>
      );
    }

    function CircularHUD({ steps, maxSteps, water, maxWater }) {
      const radiusSteps = 100; const radiusWater = 65;
      const circumferenceSteps = 2 * Math.PI * radiusSteps; const circumferenceWater = 2 * Math.PI * radiusWater;
      const stepOffset = circumferenceSteps - (Math.min(steps / maxSteps, 1) * circumferenceSteps);
      const waterOffset = circumferenceWater - (Math.min(water / maxWater, 1) * circumferenceWater);

      return (
        <div className="relative w-72 h-72 mx-auto my-6 flex items-center justify-center">
          <div className="absolute inset-0 w-full h-full rounded-full bg-[#E5E5E5] border-[2px] border-[#FFFFFF] shadow-[10px_20px_40px_rgba(0,0,0,0.15),_inset_0_0_10px_rgba(0,0,0,0.05)]"></div>
          
          <div className="absolute top-[10%] left-[15%] w-4 h-4 rounded-full bg-gradient-to-br from-[#888] to-[#111] shadow-[2px_4px_6px_rgba(0,0,0,0.4),_inset_0_1px_2px_rgba(255,255,255,0.6)] z-30"></div>
          <div className="absolute bottom-[20%] right-[10%] w-5 h-5 rounded-full bg-gradient-to-br from-[#888] to-[#111] shadow-[2px_4px_6px_rgba(0,0,0,0.4),_inset_0_1px_2px_rgba(255,255,255,0.6)] z-30"></div>
          
          <div className="absolute w-[216px] h-[216px] rounded-full bg-[#D8D8D8] shadow-[inset_0_6px_10px_rgba(0,0,0,0.2),_0_1px_1px_rgba(255,255,255,0.9)] flex items-center justify-center">
            <svg className="absolute w-full h-full transform -rotate-90 z-10" viewBox="0 0 216 216">
              <defs>
                <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#FF8A00" /><stop offset="100%" stopColor="#FF4A1C" /></linearGradient>
              </defs>
              <circle cx="108" cy="108" r={radiusSteps} stroke="url(#orangeGlow)" strokeWidth="8" fill="none" strokeDasharray={circumferenceSteps} strokeDashoffset={stepOffset} strokeLinecap="round" className="transition-all duration-1000 ease-out drop-shadow-[0_0_5px_rgba(255,74,28,0.8)]" />
            </svg>
            <div className="absolute w-[160px] h-[160px] rounded-full bg-[#E5E5E5] border border-[#FFFFFF] shadow-[0_5px_15px_rgba(0,0,0,0.2),_inset_0_1px_2px_rgba(255,255,255,1)] flex items-center justify-center z-20">
              <div className="absolute w-[140px] h-[140px] rounded-full bg-[#D0D0D0] shadow-[inset_0_4px_8px_rgba(0,0,0,0.2),_0_1px_1px_rgba(255,255,255,0.9)] flex items-center justify-center">
                 <svg className="absolute w-full h-full transform -rotate-90 z-10" viewBox="0 0 140 140">
                    <circle cx="70" cy="70" r={radiusWater} stroke="#1A1A1A" strokeWidth="6" fill="none" strokeDasharray={circumferenceWater} strokeDashoffset={waterOffset} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                 </svg>
                 <div className={`absolute w-[100px] h-[100px] rounded-full ${theme.blackKnob} flex flex-col items-center justify-center z-20 overflow-hidden`}>
                    <div className="absolute top-0 left-[10%] w-[80%] h-[40%] bg-gradient-to-b from-[rgba(255,255,255,0.2)] to-transparent rounded-full pointer-events-none"></div>
                    <div className="relative z-30 flex flex-col items-center justify-center text-center mt-2">
                      <span className="text-[8px] font-mono text-[#A0A0A0] tracking-widest mb-0.5 shadow-[0_1px_1px_black]">STEPS</span>
                      <span className="text-2xl font-black text-white leading-none drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">{steps}</span>
                      <div className="w-6 h-[1px] bg-[#555] my-1.5 shadow-[0_1px_0_rgba(255,255,255,0.1)]"></div>
                      <span className="text-sm font-bold text-[#E0E0E0] leading-none drop-shadow-[0_1px_2px_rgba(0,0,0,1)]">{water}<span className="text-[9px] text-[#A0A0A0]">L</span></span>
                    </div>
                 </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TrackerTab({ steps, setSteps, water, setWater, workout, setWorkout, routineType, setRoutineType, completedExercises, setCompletedExercises }) {
      const toggleExercise = (id) => setCompletedExercises(prev => ({ ...prev, [id]: !prev[id] }));
      const currentTaskList = workout === 'fuerza' ? workoutPlan[`fuerza${routineType}`] : workoutPlan[workout];

      return (
        <div className="space-y-10">
          <div className={`${theme.panel3D} rounded-3xl p-6 relative`}>
            <div className="flex justify-between items-center mb-2 px-4">
              <span className={`${theme.fontMono} text-[10px] font-bold text-[#606060]`}>MODULO.01 // METRICS</span>
              <span className={`${theme.fontMono} text-[9px] bg-[#1A1A1A] text-[#FF4A1C] px-2 py-0.5 rounded shadow-inner`}>REC</span>
            </div>
            <CircularHUD steps={steps} maxSteps={10000} water={water} maxWater={8} />
            <div className="grid grid-cols-2 gap-6 mt-6 px-2">
              <div className={`${theme.grooveInset} rounded-xl p-1.5 flex justify-between items-center`}>
                <button onClick={() => { playSound('switch'); setSteps(p => Math.max(0, p - 500)); }} className={`w-8 h-8 rounded-lg flex items-center justify-center text-[#1A1A1A] ${theme.btn3D}`}><Minus size={16}/></button>
                <span className={`${theme.fontMono} text-[10px] font-bold text-[#606060]`}>PASOS</span>
                <button onClick={() => { playSound('switch'); setSteps(p => p + 500); }} className={`w-8 h-8 rounded-lg flex items-center justify-center text-[#FF4A1C] font-bold ${theme.btn3D}`}><Plus size={16}/></button>
              </div>
              <div className={`${theme.grooveInset} rounded-xl p-1.5 flex justify-between items-center`}>
                <button onClick={() => { playSound('switch'); setWater(p => Math.max(0, p - 1)); }} className={`w-8 h-8 rounded-lg flex items-center justify-center text-[#1A1A1A] ${theme.btn3D}`}><Minus size={16}/></button>
                <span className={`${theme.fontMono} text-[10px] font-bold text-[#606060]`}>AGUA</span>
                <button onClick={() => { playSound('switch'); setWater(p => p + 1); }} className={`w-8 h-8 rounded-lg flex items-center justify-center text-[#1A1A1A] font-bold ${theme.btn3D}`}><Plus size={16}/></button>
              </div>
            </div>
          </div>

          <div className={`${theme.panel3D} rounded-3xl p-6 relative`}>
            <div className="flex items-center gap-2 mb-6 border-b border-[#D0D0D0] pb-3">
              <Hexagon size={18} className="text-[#FF4A1C]" />
              <h2 className={`${theme.fontMono} text-sm font-bold text-[#1A1A1A]`}>MODULO.02 // TAREAS</h2>
            </div>
            <div className={`flex gap-2 mb-6 p-1.5 rounded-xl ${theme.grooveInset}`}>
              {['descanso', 'fuerza', 'cardio'].map(mode => (
                <button key={mode} onClick={() => { playSound('switch'); setWorkout(mode); }} className={`flex-1 py-2 rounded-lg ${theme.fontMono} text-[9px] font-bold ${workout === mode ? 'bg-[#1A1A1A] text-[#FF4A1C] shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)]' : `${theme.btn3D} text-[#606060]`}`}>{mode}</button>
              ))}
            </div>
            {workout === 'fuerza' && (
              <div className="flex justify-center gap-4 mb-6">
                {['A', 'B'].map(type => (
                   <button key={type} onClick={() => { playSound('switch'); setRoutineType(type); }} className={`w-12 h-8 rounded-md ${theme.fontMono} text-[10px] font-black ${routineType === type ? 'bg-[#FF4A1C] text-white shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]' : `${theme.btn3D} text-[#808080]`}`}>{type}</button>
                ))}
              </div>
            )}
            <div className="space-y-3">
              {currentTaskList.map((item, idx) => {
                const isChecked = completedExercises[item.id] || false;
                return (
                  <div key={item.id} onClick={() => { playSound(isChecked ? 'switch' : 'success'); toggleExercise(item.id); }} className={`flex justify-between items-center p-3 rounded-xl cursor-pointer ${isChecked ? `bg-[#E0E0E0] shadow-[inset_0_2px_6px_rgba(0,0,0,0.1)] border border-[#C0C0C0]` : theme.btn3D}`}>
                    <div className="flex items-center gap-4">
                      <div className={`w-3 h-3 rounded-full border border-[#1A1A1A] ${isChecked ? 'bg-[#FF4A1C] shadow-[0_0_8px_#FF4A1C]' : 'bg-[#D0D0D0] shadow-inner'}`}></div>
                      <div>
                        <p className={`${theme.fontMono} text-[11px] font-bold ${isChecked ? 'text-[#808080]' : 'text-[#1A1A1A]'}`}>{item.name}</p>
                        <p className={`${theme.fontMono} text-[8px] text-[#A0A0A0] mt-1 font-bold`}>PARAM: {item.sets}</p>
                      </div>
                    </div>
                    <span className={`${theme.fontMono} text-[9px] text-[#1A1A1A] bg-[#D0D0D0] px-2 py-0.5 rounded shadow-inner font-bold`}>0{idx + 1}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function MenuTab() {
      const mealData = { 
        desayuno: { title: "PROTOCOL: SIMBIÓTICO", items: ["AVENA INTEGRAL [SEC:01]", "MANZANA (FIBRA) [SEC:02]", "YOGUR GRIEGO [SEC:03]"], tip: "TÉ VERDE A MEDIA MAÑANA." },
        comida: { title: "PROTOCOL: EQUILIBRIO", items: ["POLLO/QUINOA/VERDE [OPT:A]", "LENTEJAS ESTOFADAS [OPT:B]", "SALMÓN/BRÓCOLI [OPT:C]"], tip: "MANZANA T-15 MINUTOS." },
        cena: { title: "PROTOCOL: NOCHE", items: ["HUEVOS/CHAMPIÑÓN [OPT:A]", "PESCADO BLANCO [OPT:B]", "ENSALADA DE ATÚN [OPT:C]"], tip: "EVITAR ALCOHOL/AZÚCAR." }
      };
      const [mealType, setMealType] = useState('comida');
      return (
        <div className={`${theme.panel3D} rounded-3xl p-6 relative`}>
           <div className={`flex gap-2 mb-6 p-1.5 rounded-xl ${theme.grooveInset}`}>
            {['desayuno', 'comida', 'cena'].map((type) => (
              <button key={type} onClick={() => { playSound('switch'); setMealType(type); }} className={`flex-1 py-2 rounded-lg ${theme.fontMono} text-[9px] font-bold ${mealType === type ? 'bg-[#1A1A1A] text-[#FF4A1C] shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)]' : `${theme.btn3D} text-[#606060]`}`}>{type}</button>
            ))}
          </div>
          <div className={`bg-[#E5E5E5] border border-[#FFFFFF] rounded-2xl p-5 shadow-[inset_0_2px_6px_rgba(0,0,0,0.05)]`}>
            <h2 className={`${theme.fontMono} text-sm mb-5 text-[#1A1A1A] font-black`}>{mealData[mealType].title}</h2>
            <div className="space-y-4">
              {mealData[mealType].items.map((item, idx) => (
                <div key={idx} className="flex items-center gap-3">
                  <span className="w-2 h-2 rounded-sm bg-[#FF4A1C] shadow-[0_1px_2px_rgba(0,0,0,0.3)]"></span>
                  <span className={`${theme.fontMono} text-[11px] font-bold text-[#404040]`}>{item}</span>
                </div>
              ))}
            </div>
            <div className="mt-6 p-3 rounded-xl bg-[#D0D0D0] shadow-inner flex gap-3 items-start border-t border-[#1A1A1A]/10">
              <span className={`${theme.fontMono} text-[9px] font-black text-[#FF4A1C] mt-0.5`}>NOTE:</span>
              <p className={`${theme.fontMono} text-[9px] text-[#505050] font-bold`}>{mealData[mealType].tip}</p>
            </div>
          </div>
        </div>
      );
    }

    function TipsTab() {
      return (
        <div className={`${theme.panel3D} rounded-3xl p-6 relative`}>
          <div className="flex items-center gap-2 mb-6 border-b border-[#D0D0D0] pb-3">
            <h2 className={`${theme.fontMono} text-sm font-bold text-[#1A1A1A]`}>DATABASE // KNOWLEDGE</h2>
          </div>
          <div className="space-y-4">
            <TipCard idx="01" title="ESPEJISMO VISUAL" content="El abdomen presenta mayor latencia de cambio. El progreso se refleja en extremidades." />
            <TipCard idx="02" title="MESETA METABÓLICA" content="Ante un estancamiento, incrementar NEAT en lugar de reducir comida." />
            <TipCard idx="03" title="RETENCIÓN CORTISOL" content="El estrés agudo retiene líquidos. Se requiere recalibración (descanso de dieta)." />
            <TipCard idx="04" title="RECUPERACIÓN" content="Privación de sueño altera la grelina (hambre). Requisito: 7 horas continuas." />
          </div>
        </div>
      );
    }

    function TipCard({ idx, title, content }) {
      return (
        <div className={`${theme.btn3D} p-4 rounded-xl flex flex-col gap-2`}>
          <div className="flex items-center gap-3 border-b border-[#D0D0D0] pb-2">
            <span className={`${theme.fontMono} text-[10px] font-black text-white bg-[#1A1A1A] px-2 py-0.5 rounded shadow-inner`}>{idx}</span>
            <h3 className={`${theme.fontMono} text-[11px] font-black text-[#1A1A1A]`}>{title}</h3>
          </div>
          <p className="text-[11px] font-sans font-medium text-[#505050] leading-relaxed pt-1">{content}</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
